<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pokemon Math Battle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --hp-green: #22c55e;
  --hp-yellow: #eab308;
  --hp-red: #ef4444;
}

body {
  font-family: 'Press Start 2P', monospace;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  overflow: hidden;
}

#game {
  width: 100%;
  max-width: 480px;
  height: 100dvh;
  max-height: 860px;
  display: flex;
  flex-direction: column;
  background: #e8e8e8;
  position: relative;
  overflow: hidden;
}

/* ===== Title Screen ===== */
#title-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #1e3a5f 0%, #0f1b2d 100%);
  z-index: 100;
}
#title-screen h1 {
  font-size: 18px; color: #fbbf24;
  text-shadow: 2px 2px #b45309, 0 0 20px rgba(251,191,36,0.5);
  text-align: center; line-height: 1.8; margin-bottom: 10px;
}
#title-screen .subtitle { font-size: 10px; color: #93c5fd; margin-bottom: 40px; }

.title-sprites {
  display: flex; gap: 8px; margin-bottom: 24px;
}
.title-sprites img {
  width: 64px; height: 64px; image-rendering: pixelated;
  animation: pokeball-bounce 1.5s ease-in-out infinite;
}
.title-sprites img:nth-child(2) { animation-delay: 0.3s; }
.title-sprites img:nth-child(3) { animation-delay: 0.6s; }

@keyframes pokeball-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.start-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px; color: #fff; background: #3b82f6;
  border: none; padding: 16px 40px; cursor: pointer;
  border-radius: 8px; box-shadow: 0 4px 0 #1d4ed8;
  animation: blink 1.2s step-end infinite;
}
.start-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #1d4ed8; }

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* ===== Select Screen ===== */
#select-screen {
  position: absolute; inset: 0; display: none;
  flex-direction: column; align-items: center;
  background: linear-gradient(180deg, #1e3a5f 0%, #0f1b2d 100%);
  z-index: 90; padding: 20px; overflow-y: auto;
}
#select-screen h2 { font-size: 13px; color: #fbbf24; margin: 16px 0 20px; text-align: center; }

.pokemon-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; width: 100%; max-width: 360px;
}
.pokemon-card {
  background: rgba(255,255,255,0.08); border: 3px solid rgba(255,255,255,0.15);
  border-radius: 12px; padding: 10px 6px; text-align: center; cursor: pointer;
  transition: all 0.2s;
}
.pokemon-card:hover, .pokemon-card.selected {
  border-color: #fbbf24; background: rgba(251,191,36,0.15); transform: scale(1.05);
}
.pokemon-card img { width: 72px; height: 72px; image-rendering: pixelated; }
.pokemon-card .name { font-size: 7px; color: #fff; display: block; margin: 4px 0; }
.pokemon-card .type-badge {
  font-size: 7px; color: #fff; padding: 2px 6px; border-radius: 4px; display: inline-block;
}
.pokemon-card .stats-preview {
  font-size: 6px; color: #aaa; margin-top: 4px; display: block; line-height: 1.6;
}

.confirm-btn {
  font-family: 'Press Start 2P', monospace; font-size: 12px; color: #fff;
  background: #22c55e; border: none; padding: 14px 36px; cursor: pointer;
  border-radius: 8px; box-shadow: 0 4px 0 #15803d; margin-top: 20px; display: none;
}
.confirm-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #15803d; }

/* ===== Battle Scene ===== */
#battle-scene { flex: 1; display: none; flex-direction: column; position: relative; }

.battle-bg {
  flex: 1; position: relative; min-height: 280px; overflow: hidden;
  background: linear-gradient(180deg, #87ceeb 0%, #b4d7e8 40%, #90be6d 50%, #6a9f4d 100%);
}

/* Ground platforms */
.ground-enemy {
  position: absolute; top: 42%; right: 10%; width: 140px; height: 24px;
  background: radial-gradient(ellipse, #6a9f4d 0%, transparent 70%);
}
.ground-player {
  position: absolute; bottom: 8%; left: 5%; width: 180px; height: 30px;
  background: radial-gradient(ellipse, #5a8f3d 0%, transparent 70%);
}

.info-box {
  position: absolute; background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(240,240,240,0.95));
  border: 3px solid #333; border-radius: 10px; padding: 10px 14px; min-width: 175px;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.15);
}
.enemy-info { top: 12px; left: 10px; }
.player-info { bottom: 12px; right: 10px; }

.info-box .poke-name { font-size: 10px; color: #333; }
.info-box .poke-level { font-size: 8px; color: #666; float: right; margin-top: 2px; }

.hp-bar-container { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.hp-label { font-size: 8px; color: #f97316; font-weight: bold; }
.hp-bar-bg { flex: 1; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
.hp-bar-fill {
  height: 100%; background: var(--hp-green); border-radius: 4px;
  transition: width 0.6s ease, background-color 0.3s;
}
.hp-text { font-size: 7px; color: #555; text-align: right; margin-top: 3px; }

.exp-bar-container { margin-top: 3px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
.exp-bar-fill { height: 100%; background: #60a5fa; border-radius: 2px; transition: width 0.5s; width: 0%; }

/* Pokemon sprites */
.enemy-pokemon {
  position: absolute; top: 16%; right: 14%;
  width: 120px; height: 120px;
  image-rendering: pixelated;
  filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.3));
  transition: all 0.3s; z-index: 5;
}
.player-pokemon {
  position: absolute; bottom: 12%; left: 8%;
  width: 140px; height: 140px;
  image-rendering: pixelated;
  filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.3));
  transition: all 0.3s; z-index: 5;
}

/* FX Canvas */
#fx-canvas {
  position: absolute; inset: 0; z-index: 10; pointer-events: none;
}

/* Animations */
@keyframes attack-right {
  0% { transform: translateX(0); }
  25% { transform: translateX(60px) scale(1.1); }
  50% { transform: translateX(0) scale(1); }
}
@keyframes attack-left {
  0% { transform: translateX(0); }
  25% { transform: translateX(-60px) scale(1.1); }
  50% { transform: translateX(0) scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-8px); }
  80% { transform: translateX(8px); }
}
@keyframes flash-hit {
  0%, 100% { opacity: 1; filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.3)); }
  20% { opacity: 0.3; filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.3)) brightness(3); }
  40% { opacity: 1; }
  60% { opacity: 0.3; filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.3)) brightness(3); }
  80% { opacity: 1; }
}
@keyframes special-charge {
  0% { filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.3)); }
  50% { filter: drop-shadow(0 0 20px #fbbf24) drop-shadow(0 0 40px #f97316) brightness(1.3); }
  100% { filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.3)); }
}
@keyframes enemy-faint {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(40px) scaleY(0.1); }
}

.attack-anim { animation: attack-right 0.5s ease-out; }
.hit-anim { animation: flash-hit 0.5s ease-out, shake 0.5s ease-out; }
.enemy-attack-anim { animation: attack-left 0.5s ease-out; }
.special-charge-anim { animation: special-charge 0.6s ease-in-out; }
.faint-anim { animation: enemy-faint 0.6s ease-in forwards; }

/* Damage number */
.damage-num {
  position: absolute; font-size: 28px; color: #ef4444;
  text-shadow: 2px 2px #000, -1px -1px #000;
  pointer-events: none; animation: damage-float 1.2s ease-out forwards; z-index: 20;
}
.damage-num.heal { color: #22c55e; }
.damage-num.critical { font-size: 36px; color: #fbbf24; }

@keyframes damage-float {
  0% { opacity: 1; transform: translateY(0) scale(0.5); }
  20% { opacity: 1; transform: translateY(-20px) scale(1.3); }
  50% { opacity: 1; transform: translateY(-40px) scale(1); }
  100% { opacity: 0; transform: translateY(-70px) scale(0.8); }
}

/* Level & streak indicators */
.level-indicator {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); color: #fbbf24; font-size: 9px;
  padding: 4px 14px; border-radius: 10px; z-index: 10;
}
.streak-indicator {
  position: absolute; top: 8px; right: 8px; font-size: 8px; color: #fff;
  background: linear-gradient(135deg, #ef4444, #f97316);
  padding: 3px 10px; border-radius: 8px; z-index: 10; display: none;
  box-shadow: 0 2px 8px rgba(239,68,68,0.5);
}
.charge-indicator {
  position: absolute; top: 30px; right: 8px; font-size: 7px; color: #c4b5fd;
  background: rgba(139,92,246,0.7); padding: 3px 8px; border-radius: 8px;
  z-index: 10; display: none;
}

/* ===== Battle UI Bottom ===== */
.battle-ui {
  background: #f5f5f5; border-top: 4px solid #333;
  padding: 12px; display: flex; flex-direction: column; gap: 10px;
}
.message-box {
  background: #fff; border: 3px solid #333; border-radius: 8px;
  padding: 10px 12px; font-size: 10px; color: #333; line-height: 1.6;
  min-height: 48px; display: flex; align-items: center;
}

.question-panel { display: none; flex-direction: column; gap: 10px; }
.question-text {
  font-size: 16px; color: #333; text-align: center; padding: 10px 8px;
  background: #fff; border: 3px solid #333; border-radius: 8px;
  line-height: 1.5;
}

.answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.answer-btn {
  font-family: 'Press Start 2P', monospace; font-size: 12px; color: #fff;
  border: none; padding: 14px 8px; cursor: pointer; border-radius: 8px;
  transition: all 0.1s; position: relative; overflow: hidden;
}
.answer-btn:nth-child(1) { background: #3b82f6; box-shadow: 0 4px 0 #1d4ed8; }
.answer-btn:nth-child(2) { background: #ef4444; box-shadow: 0 4px 0 #b91c1c; }
.answer-btn:nth-child(3) { background: #22c55e; box-shadow: 0 4px 0 #15803d; }
.answer-btn:nth-child(4) { background: #f97316; box-shadow: 0 4px 0 #c2410c; }
.answer-btn:active { transform: translateY(4px); box-shadow: none; }
.answer-btn.correct { background: #22c55e !important; animation: btn-correct 0.5s; }
.answer-btn.wrong { background: #6b7280 !important; animation: btn-wrong 0.3s; }

@keyframes btn-correct { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes btn-wrong { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

.action-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.action-btn {
  font-family: 'Press Start 2P', monospace; font-size: 9px; color: #fff;
  border: none; padding: 14px 8px; cursor: pointer; border-radius: 8px; transition: all 0.1s;
}
.action-btn.fight { background: #ef4444; box-shadow: 0 4px 0 #b91c1c; }
.action-btn.heal { background: #22c55e; box-shadow: 0 4px 0 #15803d; }
.action-btn.special { background: #8b5cf6; box-shadow: 0 4px 0 #6d28d9; }
.action-btn.run { background: #6b7280; box-shadow: 0 4px 0 #4b5563; }
.action-btn:active { transform: translateY(4px); box-shadow: none; }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.timer-bar-container { height: 6px; background: #ddd; border-radius: 3px; overflow: hidden; }
.timer-bar { height: 100%; background: #3b82f6; border-radius: 3px; transition: width 0.1s linear; }

/* ===== Result Screen ===== */
#result-screen {
  position: absolute; inset: 0; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  z-index: 80; padding: 30px;
}
#result-screen.victory { background: linear-gradient(180deg, #1e3a5f 0%, #0f2b1e 100%); }
#result-screen.defeat { background: linear-gradient(180deg, #3b0f0f 0%, #1a0505 100%); }
#result-screen .result-emoji { font-size: 80px; margin-bottom: 20px; }
#result-screen h2 { font-size: 20px; margin-bottom: 16px; }
#result-screen.victory h2 { color: #fbbf24; }
#result-screen.defeat h2 { color: #ef4444; }

.stats-box {
  background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px; padding: 16px 24px; margin-bottom: 24px;
  width: 100%; max-width: 300px;
}
.stat-row { display: flex; justify-content: space-between; font-size: 9px; color: #ccc; padding: 6px 0; }
.stat-row + .stat-row { border-top: 1px solid rgba(255,255,255,0.1); }
.stat-val { color: #fbbf24; }

.restart-btn {
  font-family: 'Press Start 2P', monospace; font-size: 12px; color: #fff;
  background: #3b82f6; border: none; padding: 14px 32px; cursor: pointer;
  border-radius: 8px; box-shadow: 0 4px 0 #1d4ed8;
}
.restart-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #1d4ed8; }

/* Screen flash */
.screen-flash {
  position: absolute; inset: 0; z-index: 30; pointer-events: none;
  animation: screen-flash-anim 0.3s ease-out forwards;
}
@keyframes screen-flash-anim {
  0% { opacity: 0.8; }
  100% { opacity: 0; }
}

/* Responsive */
@media (max-height: 700px) {
  .battle-bg { min-height: 220px; }
  .enemy-pokemon { width: 96px; height: 96px; top: 14%; }
  .player-pokemon { width: 112px; height: 112px; }
  .info-box { padding: 8px 10px; min-width: 150px; }
}
</style>
</head>
<body>

<div id="game">
  <!-- Title Screen -->
  <div id="title-screen">
    <div class="title-sprites">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" alt="">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" alt="">
    </div>
    <h1>POKEMON<br>MATH BATTLE</h1>
    <p class="subtitle">初中数学对战！</p>
    <button class="start-btn" onclick="showSelectScreen()">START</button>
  </div>

  <!-- Select Screen -->
  <div id="select-screen">
    <h2>选择你的宝可梦！</h2>
    <div class="pokemon-grid" id="pokemon-grid"></div>
    <button class="confirm-btn" id="confirm-btn" onclick="startBattle()">出发！</button>
  </div>

  <!-- Battle Scene -->
  <div id="battle-scene">
    <div class="battle-bg" id="battle-bg">
      <div class="level-indicator" id="level-indicator">ROUND 1</div>
      <div class="streak-indicator" id="streak-indicator"></div>
      <div class="charge-indicator" id="charge-indicator"></div>

      <div class="info-box enemy-info">
        <span class="poke-name" id="enemy-name">???</span>
        <span class="poke-level" id="enemy-level">Lv.5</span>
        <div class="hp-bar-container">
          <span class="hp-label">HP</span>
          <div class="hp-bar-bg"><div class="hp-bar-fill" id="enemy-hp-bar"></div></div>
        </div>
        <div class="hp-text" id="enemy-hp-text">100 / 100</div>
      </div>

      <div class="info-box player-info">
        <span class="poke-name" id="player-name">???</span>
        <span class="poke-level" id="player-level">Lv.5</span>
        <div class="hp-bar-container">
          <span class="hp-label">HP</span>
          <div class="hp-bar-bg"><div class="hp-bar-fill" id="player-hp-bar"></div></div>
        </div>
        <div class="hp-text" id="player-hp-text">100 / 100</div>
        <div class="exp-bar-container"><div class="exp-bar-fill" id="exp-bar"></div></div>
      </div>

      <div class="ground-enemy"></div>
      <div class="ground-player"></div>

      <img class="enemy-pokemon" id="enemy-sprite" src="" alt="">
      <img class="player-pokemon" id="player-sprite" src="" alt="">
      <canvas id="fx-canvas"></canvas>
    </div>

    <div class="battle-ui">
      <div class="message-box" id="message-box">你想要做什么？</div>
      <div class="timer-bar-container" id="timer-container" style="display:none">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
      <div class="action-panel" id="action-panel">
        <button class="action-btn fight" onclick="chooseAction('fight')">⚔️ 攻击</button>
        <button class="action-btn heal" onclick="chooseAction('heal')">💊 回复</button>
        <button class="action-btn special" id="special-btn" onclick="chooseAction('special')">✨ 必杀 (0/3)</button>
        <button class="action-btn run" onclick="chooseAction('run')">🏃 逃跑</button>
      </div>
      <div class="question-panel" id="question-panel">
        <div class="question-text" id="question-text"></div>
        <div class="answer-grid" id="answer-grid"></div>
      </div>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen">
    <div class="result-emoji" id="result-emoji"></div>
    <h2 id="result-title"></h2>
    <div class="stats-box">
      <div class="stat-row"><span>回答正确</span><span class="stat-val" id="stat-correct">0</span></div>
      <div class="stat-row"><span>回答错误</span><span class="stat-val" id="stat-wrong">0</span></div>
      <div class="stat-row"><span>正确率</span><span class="stat-val" id="stat-accuracy">0%</span></div>
      <div class="stat-row"><span>最高连击</span><span class="stat-val" id="stat-streak">0</span></div>
      <div class="stat-row"><span>击败对手</span><span class="stat-val" id="stat-defeated">0</span></div>
    </div>
    <button class="restart-btn" onclick="restartGame()">再来一局</button>
  </div>
</div>

<script>
// ========== SPRITE URLS ==========
const SPRITE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon';
const sprite = (id) => `${SPRITE}/${id}.png`;
const spriteBack = (id) => `${SPRITE}/back/${id}.png`;

// ========== POKEMON DATA ==========
const TYPE_COLORS = {
  electric: '#fbbf24', fire: '#ef4444', water: '#3b82f6', grass: '#22c55e',
  normal: '#a3a3a3', ghost: '#8b5cf6', flying: '#93c5fd', bug: '#84cc16',
  psychic: '#ec4899', poison: '#a855f7', rock: '#78716c', fighting: '#b45309',
  ice: '#67e8f9', dragon: '#7c3aed',
};

const POKEMON = [
  { name: '皮卡丘', id: 25, type: 'electric', hp: 110, atk: 28, spAtk: 50, skill: '十万伏特' },
  { name: '小火龙', id: 4, type: 'fire', hp: 100, atk: 24, spAtk: 55, skill: '火焰喷射' },
  { name: '杰尼龟', id: 7, type: 'water', hp: 130, atk: 22, spAtk: 45, skill: '水炮' },
  { name: '妙蛙种子', id: 1, type: 'grass', hp: 120, atk: 24, spAtk: 48, skill: '飞叶快刀' },
  { name: '伊布', id: 133, type: 'normal', hp: 115, atk: 26, spAtk: 46, skill: '高速星星' },
  { name: '耿鬼', id: 94, type: 'ghost', hp: 90, atk: 20, spAtk: 65, skill: '暗影球' },
];

const ENEMY_POOL = [
  { name: '小拉达', id: 19, type: 'normal' },
  { name: '波波', id: 16, type: 'flying' },
  { name: '独角虫', id: 13, type: 'bug' },
  { name: '喇叭芽', id: 69, type: 'grass' },
  { name: '小火马', id: 77, type: 'fire' },
  { name: '可达鸭', id: 54, type: 'water' },
  { name: '催眠貘', id: 96, type: 'psychic' },
  { name: '臭泥', id: 88, type: 'poison' },
  { name: '小磁怪', id: 81, type: 'electric' },
  { name: '大岩蛇', id: 95, type: 'rock' },
  { name: '腕力', id: 66, type: 'fighting' },
  { name: '迷你龙', id: 147, type: 'dragon' },
];

// ========== FX ENGINE (Canvas particles) ==========
class FXEngine {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.particles = [];
    this.running = false;
  }

  resize() {
    const r = this.canvas.parentElement.getBoundingClientRect();
    this.canvas.width = r.width;
    this.canvas.height = r.height;
  }

  addParticle(p) {
    this.particles.push({ life: 1, ...p });
    if (!this.running) this.loop();
  }

  // Burst of particles at a point
  burst(x, y, count, color, opts = {}) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
      const speed = (opts.speed || 3) + Math.random() * (opts.speedVar || 2);
      const size = (opts.size || 4) + Math.random() * (opts.sizeVar || 3);
      this.addParticle({
        x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        size, color, decay: opts.decay || 0.02, gravity: opts.gravity || 0.05,
        shape: opts.shape || 'circle',
      });
    }
  }

  // Fire effect
  fireBlast(x, y) {
    const colors = ['#ef4444', '#f97316', '#fbbf24', '#fff'];
    for (let i = 0; i < 40; i++) {
      const c = colors[Math.floor(Math.random() * colors.length)];
      this.addParticle({
        x: x + (Math.random() - 0.5) * 40,
        y: y + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 6,
        vy: -Math.random() * 5 - 2,
        size: 3 + Math.random() * 6, color: c, decay: 0.025, gravity: -0.02,
        shape: 'circle',
      });
    }
  }

  // Water effect
  waterBlast(x, y) {
    const colors = ['#3b82f6', '#60a5fa', '#93c5fd', '#bfdbfe'];
    for (let i = 0; i < 35; i++) {
      const c = colors[Math.floor(Math.random() * colors.length)];
      const angle = Math.random() * Math.PI * 2;
      this.addParticle({
        x, y, vx: Math.cos(angle) * (2 + Math.random() * 4),
        vy: Math.sin(angle) * (2 + Math.random() * 4),
        size: 3 + Math.random() * 5, color: c, decay: 0.02, gravity: 0.08,
        shape: 'circle',
      });
    }
  }

  // Electric effect
  electricBlast(x, y) {
    const colors = ['#fbbf24', '#fde68a', '#fff', '#f59e0b'];
    for (let i = 0; i < 30; i++) {
      const c = colors[Math.floor(Math.random() * colors.length)];
      this.addParticle({
        x: x + (Math.random() - 0.5) * 60,
        y: y + (Math.random() - 0.5) * 60,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8,
        size: 2 + Math.random() * 3, color: c, decay: 0.04, gravity: 0,
        shape: 'bolt',
      });
    }
  }

  // Grass effect
  grassBlast(x, y) {
    const colors = ['#22c55e', '#4ade80', '#86efac', '#bbf7d0'];
    for (let i = 0; i < 25; i++) {
      const c = colors[Math.floor(Math.random() * colors.length)];
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
      this.addParticle({
        x: x + (Math.random() - 0.5) * 30, y,
        vx: Math.cos(angle) * (3 + Math.random() * 3),
        vy: Math.sin(angle) * (3 + Math.random() * 3),
        size: 4 + Math.random() * 4, color: c, decay: 0.018, gravity: 0.03,
        shape: 'leaf',
      });
    }
  }

  // Ghost/dark effect
  ghostBlast(x, y) {
    const colors = ['#8b5cf6', '#a78bfa', '#7c3aed', '#4c1d95'];
    for (let i = 0; i < 30; i++) {
      const c = colors[Math.floor(Math.random() * colors.length)];
      this.addParticle({
        x: x + (Math.random() - 0.5) * 50,
        y: y + (Math.random() - 0.5) * 50,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        size: 5 + Math.random() * 8, color: c, decay: 0.015, gravity: -0.02,
        shape: 'circle', glow: true,
      });
    }
  }

  // Normal/star effect
  starBlast(x, y) {
    const colors = ['#fbbf24', '#fde68a', '#fff', '#f59e0b'];
    for (let i = 0; i < 20; i++) {
      const c = colors[Math.floor(Math.random() * colors.length)];
      const angle = (Math.PI * 2 / 20) * i;
      this.addParticle({
        x, y, vx: Math.cos(angle) * (3 + Math.random() * 2),
        vy: Math.sin(angle) * (3 + Math.random() * 2),
        size: 3 + Math.random() * 3, color: c, decay: 0.025, gravity: 0,
        shape: 'star',
      });
    }
  }

  // Heal effect
  healEffect(x, y) {
    const colors = ['#22c55e', '#86efac', '#bbf7d0', '#fff'];
    for (let i = 0; i < 20; i++) {
      const c = colors[Math.floor(Math.random() * colors.length)];
      this.addParticle({
        x: x + (Math.random() - 0.5) * 60,
        y: y + Math.random() * 20,
        vx: (Math.random() - 0.5) * 1.5,
        vy: -Math.random() * 3 - 1,
        size: 3 + Math.random() * 4, color: c, decay: 0.015, gravity: -0.03,
        shape: 'cross',
      });
    }
  }

  // Ultimate charge-up sparkle
  chargeSparkle(x, y) {
    const colors = ['#fbbf24', '#f97316', '#ef4444', '#fff'];
    for (let i = 0; i < 50; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 60;
      const c = colors[Math.floor(Math.random() * colors.length)];
      this.addParticle({
        x: x + Math.cos(angle) * dist,
        y: y + Math.sin(angle) * dist,
        vx: -Math.cos(angle) * (2 + Math.random() * 2),
        vy: -Math.sin(angle) * (2 + Math.random() * 2),
        size: 2 + Math.random() * 4, color: c, decay: 0.02, gravity: 0,
        shape: 'circle', glow: true,
      });
    }
  }

  loop() {
    this.running = true;
    const animate = () => {
      if (this.particles.length === 0) { this.running = false; return; }
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.particles = this.particles.filter(p => {
        p.life -= p.decay;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.98;
        if (p.life <= 0) return false;

        this.ctx.save();
        this.ctx.globalAlpha = Math.max(0, p.life);

        if (p.glow) {
          this.ctx.shadowColor = p.color;
          this.ctx.shadowBlur = 15;
        }

        this.ctx.fillStyle = p.color;
        this.ctx.translate(p.x, p.y);

        if (p.shape === 'star') {
          this.drawStar(p.size);
        } else if (p.shape === 'bolt') {
          this.drawBolt(p.size);
        } else if (p.shape === 'leaf') {
          this.ctx.rotate(Math.atan2(p.vy, p.vx));
          this.ctx.beginPath();
          this.ctx.ellipse(0, 0, p.size, p.size * 0.4, 0, 0, Math.PI * 2);
          this.ctx.fill();
        } else if (p.shape === 'cross') {
          const s = p.size;
          this.ctx.fillRect(-s/6, -s/2, s/3, s);
          this.ctx.fillRect(-s/2, -s/6, s, s/3);
        } else {
          this.ctx.beginPath();
          this.ctx.arc(0, 0, p.size * p.life, 0, Math.PI * 2);
          this.ctx.fill();
        }

        this.ctx.restore();
        return true;
      });
      requestAnimationFrame(animate);
    };
    animate();
  }

  drawStar(r) {
    this.ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
      const x = Math.cos(angle) * r;
      const y = Math.sin(angle) * r;
      i === 0 ? this.ctx.moveTo(x, y) : this.ctx.lineTo(x, y);
      const innerAngle = angle + Math.PI / 5;
      this.ctx.lineTo(Math.cos(innerAngle) * r * 0.4, Math.sin(innerAngle) * r * 0.4);
    }
    this.ctx.closePath();
    this.ctx.fill();
  }

  drawBolt(s) {
    this.ctx.beginPath();
    this.ctx.moveTo(-s, -s); this.ctx.lineTo(s*0.3, -s*0.3);
    this.ctx.lineTo(0, 0); this.ctx.lineTo(s, s);
    this.ctx.lineTo(-s*0.3, s*0.3); this.ctx.lineTo(0, 0);
    this.ctx.closePath();
    this.ctx.fill();
  }

  clear() {
    this.particles = [];
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
  }
}

// ========== GAME STATE ==========
let fx;
let state = {
  player: null, enemy: null,
  playerHP: 0, playerMaxHP: 0,
  enemyHP: 0, enemyMaxHP: 0,
  round: 1, streak: 0, maxStreak: 0,
  totalCorrect: 0, totalWrong: 0, defeated: 0,
  currentAction: null, specialCharges: 0, healCount: 3,
  timerInterval: null, busy: false, difficulty: 1, selectedIndex: -1,
};

// ========== SCREENS ==========
function showSelectScreen() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';

  const grid = document.getElementById('pokemon-grid');
  grid.innerHTML = '';
  POKEMON.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'pokemon-card';
    card.innerHTML = `
      <img src="${sprite(p.id)}" alt="${p.name}">
      <span class="name">${p.name}</span>
      <span class="type-badge" style="background:${TYPE_COLORS[p.type]}">${p.type}</span>
      <span class="stats-preview">HP:${p.hp} ATK:${p.atk} SP:${p.spAtk}</span>
    `;
    card.onclick = () => selectPokemon(i);
    grid.appendChild(card);
  });
}

function selectPokemon(index) {
  state.selectedIndex = index;
  document.querySelectorAll('.pokemon-card').forEach((c, i) => {
    c.classList.toggle('selected', i === index);
  });
  document.getElementById('confirm-btn').style.display = 'block';
}

function startBattle() {
  if (state.selectedIndex < 0) return;
  state.player = { ...POKEMON[state.selectedIndex] };
  state.playerHP = state.player.hp;
  state.playerMaxHP = state.player.hp;
  state.round = 1; state.streak = 0; state.maxStreak = 0;
  state.totalCorrect = 0; state.totalWrong = 0; state.defeated = 0;
  state.specialCharges = 0; state.healCount = 3; state.difficulty = 1;

  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('battle-scene').style.display = 'flex';

  // Init FX
  const canvas = document.getElementById('fx-canvas');
  fx = new FXEngine(canvas);
  fx.resize();
  window.addEventListener('resize', () => fx.resize());

  document.getElementById('player-name').textContent = state.player.name;
  document.getElementById('player-sprite').src = spriteBack(state.player.id);

  spawnEnemy();
  updateUI();
  showMessage(`${state.player.name}，就决定是你了！`);
}

function spawnEnemy() {
  const base = ENEMY_POOL[Math.floor(Math.random() * ENEMY_POOL.length)];
  const level = Math.min(5 + state.round * 3, 50);
  const hpScale = 0.8 + state.round * 0.3;
  const maxHP = Math.floor(80 * hpScale);

  state.enemy = { ...base, level, atk: Math.floor(12 + state.round * 4) };
  state.enemyHP = maxHP;
  state.enemyMaxHP = maxHP;
  state.difficulty = Math.min(1 + Math.floor(state.defeated / 2), 5);

  document.getElementById('enemy-name').textContent = state.enemy.name;
  document.getElementById('enemy-level').textContent = `Lv.${level}`;
  document.getElementById('enemy-sprite').src = sprite(state.enemy.id);
  document.getElementById('level-indicator').textContent = `ROUND ${state.round}`;

  const playerLevel = 5 + state.defeated * 3;
  document.getElementById('player-level').textContent = `Lv.${playerLevel}`;
}

// ========== UI ==========
function updateUI() {
  const pPct = Math.max(0, state.playerHP / state.playerMaxHP * 100);
  const pBar = document.getElementById('player-hp-bar');
  pBar.style.width = pPct + '%';
  pBar.style.backgroundColor = pPct > 50 ? 'var(--hp-green)' : pPct > 20 ? 'var(--hp-yellow)' : 'var(--hp-red)';
  document.getElementById('player-hp-text').textContent = `${Math.max(0, state.playerHP)} / ${state.playerMaxHP}`;

  const ePct = Math.max(0, state.enemyHP / state.enemyMaxHP * 100);
  const eBar = document.getElementById('enemy-hp-bar');
  eBar.style.width = ePct + '%';
  eBar.style.backgroundColor = ePct > 50 ? 'var(--hp-green)' : ePct > 20 ? 'var(--hp-yellow)' : 'var(--hp-red)';
  document.getElementById('enemy-hp-text').textContent = `${Math.max(0, state.enemyHP)} / ${state.enemyMaxHP}`;

  // Streak
  const streakEl = document.getElementById('streak-indicator');
  if (state.streak >= 2) {
    streakEl.style.display = 'block';
    streakEl.textContent = `🔥 x${state.streak}`;
  } else {
    streakEl.style.display = 'none';
  }

  // Special charges
  const spBtn = document.getElementById('special-btn');
  spBtn.textContent = `✨ 必杀 (${state.specialCharges}/3)`;

  const chargeEl = document.getElementById('charge-indicator');
  if (state.specialCharges > 0 && state.specialCharges < 3) {
    chargeEl.style.display = 'block';
    chargeEl.textContent = '⚡'.repeat(state.specialCharges) + '○'.repeat(3 - state.specialCharges);
  } else if (state.specialCharges >= 3) {
    chargeEl.style.display = 'block';
    chargeEl.textContent = '⚡⚡⚡ READY!';
    chargeEl.style.background = 'rgba(251,191,36,0.8)';
    chargeEl.style.color = '#7c2d12';
  } else {
    chargeEl.style.display = 'none';
    chargeEl.style.background = 'rgba(139,92,246,0.7)';
    chargeEl.style.color = '#c4b5fd';
  }

  // EXP bar
  document.getElementById('exp-bar').style.width = (state.defeated / 5 * 100) + '%';
}

function showMessage(text) {
  document.getElementById('message-box').textContent = text;
}

// ========== ACTIONS ==========
function chooseAction(action) {
  if (state.busy) return;
  if (action === 'run') { showResult(false); return; }

  if (action === 'heal') {
    if (state.healCount <= 0) { showMessage('药水用完了！'); return; }
    state.currentAction = 'heal';
    showMessage('答对回复HP！答错被攻击！');
  } else if (action === 'special') {
    if (state.specialCharges < 3) {
      showMessage(`必杀技需要3次连击！(${state.specialCharges}/3)`);
      return;
    }
    state.currentAction = 'special';
    showMessage(`${state.player.skill}！答对造成巨大伤害！`);
  } else {
    state.currentAction = 'fight';
    showMessage('答对就能攻击对手！');
  }
  showQuestion();
}

// ========== MATH QUESTIONS (初中水平) ==========
function generateQuestion() {
  const d = state.difficulty;
  const types = ['neg_calc', 'linear_eq'];
  if (d >= 1) types.push('fraction', 'power');
  if (d >= 2) types.push('sqrt', 'percent', 'abs_val');
  if (d >= 3) types.push('quadratic_simple', 'scientific', 'inequality');
  if (d >= 4) types.push('factorize', 'system_eq');

  const type = types[Math.floor(Math.random() * types.length)];
  let answer, text;

  switch (type) {
    case 'neg_calc': {
      // Negative number arithmetic
      const a = randInt(-15, 15);
      const b = randInt(-15, 15);
      const ops = ['+', '-', '×'];
      const op = ops[randInt(0, ops.length - 1)];
      if (op === '+') { answer = a + b; text = `(${a}) + (${b}) = ?`; }
      else if (op === '-') { answer = a - b; text = `(${a}) - (${b}) = ?`; }
      else { answer = a * b; text = `(${a}) × (${b}) = ?`; }
      break;
    }
    case 'linear_eq': {
      // Solve: ax + b = c
      const x = randInt(-10, 10);
      const a = randInt(2, 8) * (Math.random() < 0.5 ? 1 : -1);
      const b = randInt(-20, 20);
      const c = a * x + b;
      answer = x;
      text = `${a}x + ${b > 0 ? b : `(${b})`} = ${c}，x = ?`;
      break;
    }
    case 'fraction': {
      // Fraction calculation
      const d1 = randInt(2, 8);
      const d2 = randInt(2, 8);
      const n1 = randInt(1, d1 - 1);
      const n2 = randInt(1, d2 - 1);
      // Make sure result is integer for multiple choice
      const lcm = lcmOf(d1, d2);
      const sum = n1 * (lcm / d1) + n2 * (lcm / d2);
      const g = gcd(Math.abs(sum), lcm);
      if (sum % lcm === 0) {
        answer = sum / lcm;
        text = `${n1}/${d1} + ${n2}/${d2} = ?`;
      } else {
        // Fall back to simpler fraction
        const a2 = randInt(1, 5);
        const b2 = randInt(2, 6);
        answer = a2 * b2;
        text = `${a2 * b2}/${b2} = ?`;
      }
      break;
    }
    case 'power': {
      // Powers and exponents
      const base = randInt(2, 9);
      const exp = randInt(2, 3);
      answer = Math.pow(base, exp);
      text = `${base}${exp === 2 ? '²' : '³'} = ?`;
      break;
    }
    case 'sqrt': {
      // Square roots of perfect squares
      const roots = [4, 9, 16, 25, 36, 49, 64, 81, 100, 121, 144];
      const val = roots[randInt(0, roots.length - 1)];
      answer = Math.sqrt(val);
      text = `√${val} = ?`;
      break;
    }
    case 'percent': {
      // Percentage calculation
      const percents = [10, 20, 25, 30, 40, 50, 60, 75, 80];
      const p = percents[randInt(0, percents.length - 1)];
      const base2 = randInt(2, 10) * (100 / gcd(p, 100));
      const actual = Math.min(base2, 500);
      answer = actual * p / 100;
      text = `${actual} 的 ${p}% = ?`;
      break;
    }
    case 'abs_val': {
      // Absolute value
      const a = randInt(-20, -1);
      const b = randInt(-10, 10);
      answer = Math.abs(a) + b;
      text = `|${a}| + (${b}) = ?`;
      break;
    }
    case 'quadratic_simple': {
      // x² = n, find positive x
      const x2 = randInt(2, 12);
      answer = x2;
      text = `x² = ${x2 * x2}，x的正值 = ?`;
      break;
    }
    case 'scientific': {
      // Scientific notation
      const coeff = randInt(1, 9);
      const exp2 = randInt(3, 6);
      answer = coeff * Math.pow(10, exp2);
      text = `${coeff} × 10${toSuperscript(exp2)} = ?`;
      break;
    }
    case 'inequality': {
      // Simple inequality: find the integer solution count
      // ax > b where a > 0, find smallest integer x
      const a = randInt(2, 5);
      const b = randInt(1, 20);
      answer = Math.floor(b / a) + 1;
      text = `${a}x > ${b}，x最小正整数 = ?`;
      break;
    }
    case 'factorize': {
      // Simple factoring: x² - a² = (x+a)(x-a), find a²
      const a = randInt(2, 12);
      answer = a * a;
      text = `x² - ? = (x+${a})(x-${a})`;
      break;
    }
    case 'system_eq': {
      // Simple system: x + y = s, x - y = d, find x
      const x3 = randInt(1, 15);
      const y = randInt(1, 10);
      const s = x3 + y;
      const diff = x3 - y;
      answer = x3;
      text = `x+y=${s}, x-y=${diff}, x=?`;
      break;
    }
  }

  // Generate wrong answers
  const options = new Set([answer]);
  let attempts = 0;
  while (options.size < 4 && attempts < 50) {
    attempts++;
    let wrong;
    const range = Math.max(5, Math.abs(answer) * 0.4);
    const offset = randInt(1, Math.ceil(range));
    wrong = answer + (Math.random() < 0.5 ? offset : -offset);
    if (wrong !== answer) options.add(wrong);
  }
  // Fill remaining if needed
  let fill = 1;
  while (options.size < 4) { options.add(answer + fill * 3); fill++; }

  const shuffled = [...options].sort(() => Math.random() - 0.5);
  return { text, answer, options: shuffled };
}

function toSuperscript(n) {
  const sup = { '0': '⁰', '1': '¹', '2': '²', '3': '³', '4': '⁴', '5': '⁵', '6': '⁶', '7': '⁷', '8': '⁸', '9': '⁹' };
  return String(n).split('').map(c => sup[c] || c).join('');
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
function lcmOf(a, b) { return Math.abs(a * b) / gcd(a, b); }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function showQuestion() {
  const q = generateQuestion();
  state.currentQuestion = q;
  state.busy = true;

  document.getElementById('action-panel').style.display = 'none';
  document.getElementById('question-panel').style.display = 'flex';
  document.getElementById('question-text').textContent = q.text;

  const grid = document.getElementById('answer-grid');
  grid.innerHTML = '';
  q.options.forEach((opt) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt;
    btn.onclick = () => submitAnswer(opt, btn);
    grid.appendChild(btn);
  });

  startTimer();
}

function startTimer() {
  const duration = Math.max(8, 20 - state.difficulty * 2);
  const container = document.getElementById('timer-container');
  const bar = document.getElementById('timer-bar');
  container.style.display = 'block';
  bar.style.width = '100%';

  clearInterval(state.timerInterval);
  const startTime = Date.now();
  state.timerInterval = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    const remaining = Math.max(0, duration - elapsed);
    bar.style.width = (remaining / duration * 100) + '%';
    bar.style.backgroundColor = remaining > duration * 0.3 ? '#3b82f6' : '#ef4444';
    if (remaining <= 0) { clearInterval(state.timerInterval); handleWrongAnswer(); }
  }, 50);
}

// ========== ANSWER HANDLING ==========
function submitAnswer(chosen, btnEl) {
  if (!state.busy) return;
  clearInterval(state.timerInterval);
  document.getElementById('timer-container').style.display = 'none';

  const correct = chosen === state.currentQuestion.answer;
  const allBtns = document.querySelectorAll('.answer-btn');
  allBtns.forEach(b => { b.onclick = null; });

  allBtns.forEach(b => {
    const val = parseFloat(b.textContent);
    if (val === state.currentQuestion.answer) b.classList.add('correct');
    else if (b === btnEl && !correct) b.classList.add('wrong');
  });

  correct ? handleCorrectAnswer() : handleWrongAnswer();
}

async function handleCorrectAnswer() {
  state.totalCorrect++;
  state.streak++;
  state.specialCharges = Math.min(state.specialCharges + 1, 3);
  if (state.streak > state.maxStreak) state.maxStreak = state.streak;

  let damage, healAmt;

  if (state.currentAction === 'fight') {
    damage = state.player.atk + (state.streak >= 3 ? Math.floor(state.player.atk * 0.5) : 0);
    showMessage(`答对了！${state.player.name}使用了撞击！` + (state.streak >= 3 ? ' 连击加成！' : ''));
  } else if (state.currentAction === 'special') {
    damage = Math.floor(state.player.spAtk * 2.5);
    state.specialCharges = 0;
    showMessage(`${state.player.name}使用了${state.player.skill}！`);
  } else if (state.currentAction === 'heal') {
    healAmt = Math.floor(state.playerMaxHP * 0.3);
    state.healCount--;
    showMessage(`答对了！恢复了 ${healAmt} HP！(剩余:${state.healCount})`);
  }

  await sleep(400);
  fx.resize();

  if (damage) {
    const isSpecial = state.currentAction === 'special';
    if (isSpecial) {
      // Charge-up animation
      const playerEl = document.getElementById('player-sprite');
      const pRect = playerEl.getBoundingClientRect();
      const bgRect = document.getElementById('battle-bg').getBoundingClientRect();
      const px = pRect.left - bgRect.left + pRect.width / 2;
      const py = pRect.top - bgRect.top + pRect.height / 2;

      playerEl.classList.add('special-charge-anim');
      fx.chargeSparkle(px, py);
      await sleep(600);
      playerEl.classList.remove('special-charge-anim');
    }

    await playAttackAnimation(true);

    // Spawn FX at enemy position
    const enemyEl = document.getElementById('enemy-sprite');
    const eRect = enemyEl.getBoundingClientRect();
    const bgRect = document.getElementById('battle-bg').getBoundingClientRect();
    const ex = eRect.left - bgRect.left + eRect.width / 2;
    const ey = eRect.top - bgRect.top + eRect.height / 2;

    // Type-based FX
    if (isSpecial) {
      playTypeFX(state.player.type, ex, ey);
      screenFlash(TYPE_COLORS[state.player.type]);
    } else {
      fx.burst(ex, ey, 15, '#fff', { speed: 2, size: 3 });
    }

    state.enemyHP = Math.max(0, state.enemyHP - damage);
    showDamageNumber('enemy', damage, false, isSpecial);
    updateUI();

    if (state.enemyHP <= 0) {
      await sleep(500);
      await handleEnemyDefeated();
      return;
    }
  }

  if (healAmt) {
    const playerEl = document.getElementById('player-sprite');
    const pRect = playerEl.getBoundingClientRect();
    const bgRect = document.getElementById('battle-bg').getBoundingClientRect();
    fx.healEffect(pRect.left - bgRect.left + pRect.width / 2, pRect.top - bgRect.top + pRect.height / 2);

    state.playerHP = Math.min(state.playerMaxHP, state.playerHP + healAmt);
    showDamageNumber('player', healAmt, true);
    updateUI();
  }

  await sleep(600);
  endTurn();
}

async function handleWrongAnswer() {
  state.totalWrong++;
  state.streak = 0;
  state.specialCharges = 0;

  showMessage(`答错了！${state.enemy.name}发动攻击！`);
  updateUI();

  await sleep(500);
  await playAttackAnimation(false);

  // Enemy attack FX
  fx.resize();
  const playerEl = document.getElementById('player-sprite');
  const pRect = playerEl.getBoundingClientRect();
  const bgRect = document.getElementById('battle-bg').getBoundingClientRect();
  const px = pRect.left - bgRect.left + pRect.width / 2;
  const py = pRect.top - bgRect.top + pRect.height / 2;
  playTypeFX(state.enemy.type, px, py);

  const damage = state.enemy.atk + randInt(0, 5);
  state.playerHP = Math.max(0, state.playerHP - damage);
  showDamageNumber('player', damage);
  updateUI();

  if (state.playerHP <= 0) { await sleep(500); showResult(false); return; }
  await sleep(600);
  endTurn();
}

async function handleEnemyDefeated() {
  state.defeated++;
  state.round++;

  const el = document.getElementById('enemy-sprite');
  el.classList.add('faint-anim');
  showMessage(`${state.enemy.name}被击败了！`);
  await sleep(800);

  if (state.defeated >= 5) { showResult(true); return; }

  const hpGain = Math.floor(state.playerMaxHP * 0.2);
  state.playerHP = Math.min(state.playerMaxHP, state.playerHP + hpGain);

  el.classList.remove('faint-anim');
  el.style.opacity = '1';
  el.style.transform = '';
  spawnEnemy();
  updateUI();

  showMessage(`野生的${state.enemy.name}出现了！(+${hpGain}HP)`);
  await sleep(800);
  endTurn();
}

function endTurn() {
  state.busy = false;
  document.getElementById('question-panel').style.display = 'none';
  document.getElementById('action-panel').style.display = 'grid';
  showMessage('你想要做什么？');
  updateUI();
}

// ========== FX HELPERS ==========
function playTypeFX(type, x, y) {
  switch (type) {
    case 'fire': fx.fireBlast(x, y); break;
    case 'water': case 'ice': fx.waterBlast(x, y); break;
    case 'electric': fx.electricBlast(x, y); break;
    case 'grass': case 'bug': fx.grassBlast(x, y); break;
    case 'ghost': case 'psychic': case 'poison': case 'dragon': fx.ghostBlast(x, y); break;
    default: fx.starBlast(x, y); break;
  }
}

function screenFlash(color) {
  const el = document.createElement('div');
  el.className = 'screen-flash';
  el.style.background = color;
  document.getElementById('battle-bg').appendChild(el);
  setTimeout(() => el.remove(), 300);
}

// ========== ANIMATIONS ==========
async function playAttackAnimation(isPlayer) {
  return new Promise(resolve => {
    if (isPlayer) {
      const el = document.getElementById('player-sprite');
      el.classList.add('attack-anim');
      setTimeout(() => {
        el.classList.remove('attack-anim');
        const target = document.getElementById('enemy-sprite');
        target.classList.add('hit-anim');
        setTimeout(() => target.classList.remove('hit-anim'), 500);
        resolve();
      }, 250);
    } else {
      const el = document.getElementById('enemy-sprite');
      el.classList.add('enemy-attack-anim');
      setTimeout(() => {
        el.classList.remove('enemy-attack-anim');
        const target = document.getElementById('player-sprite');
        target.classList.add('hit-anim');
        setTimeout(() => target.classList.remove('hit-anim'), 500);
        resolve();
      }, 250);
    }
  });
}

function showDamageNumber(target, amount, isHeal = false, isCritical = false) {
  const container = document.getElementById('battle-bg');
  const el = document.createElement('div');
  el.className = 'damage-num' + (isHeal ? ' heal' : '') + (isCritical ? ' critical' : '');
  el.textContent = (isHeal ? '+' : '-') + amount;

  if (target === 'enemy') {
    el.style.right = '50px';
    el.style.top = '30px';
  } else {
    el.style.left = '50px';
    el.style.bottom = '80px';
  }

  container.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ========== RESULT ==========
function showResult(victory) {
  clearInterval(state.timerInterval);
  state.busy = true;

  const screen = document.getElementById('result-screen');
  screen.style.display = 'flex';
  screen.className = victory ? 'victory' : 'defeat';

  document.getElementById('result-emoji').textContent = victory ? '🏆' : '💀';
  document.getElementById('result-title').textContent = victory ? '胜利！' : '战斗结束...';

  const total = state.totalCorrect + state.totalWrong;
  document.getElementById('stat-correct').textContent = state.totalCorrect;
  document.getElementById('stat-wrong').textContent = state.totalWrong;
  document.getElementById('stat-accuracy').textContent = total > 0 ? Math.round(state.totalCorrect / total * 100) + '%' : '0%';
  document.getElementById('stat-streak').textContent = state.maxStreak;
  document.getElementById('stat-defeated').textContent = state.defeated;
}

function restartGame() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('battle-scene').style.display = 'none';
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  state.selectedIndex = -1;
  if (fx) fx.clear();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
