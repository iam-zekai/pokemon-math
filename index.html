<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pokemon Math Battle</title>
<style>
@import url('https://cdn.jsdelivr.net/npm/@fontsource/press-start-2p/400.css');

* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --hp-green: #22c55e; --hp-yellow: #eab308; --hp-red: #ef4444; }

body {
  font-family: 'Press Start 2P', monospace;
  background: #1a1a2e;
  display: flex; justify-content: center; align-items: center;
  min-height: 100dvh; overflow: hidden;
}

#game {
  width: 100%; max-width: 480px; height: 100dvh; max-height: 860px;
  display: flex; flex-direction: column; background: #e8e8e8;
  position: relative; overflow: hidden;
}

/* ===== Title ===== */
#title-screen {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
  z-index: 100;
}
.title-sprites { display: flex; gap: 8px; margin-bottom: 24px; }
.title-sprites img {
  width: 64px; height: 64px; image-rendering: pixelated;
  animation: float 2s ease-in-out infinite;
}
.title-sprites img:nth-child(2) { animation-delay: 0.4s; }
.title-sprites img:nth-child(3) { animation-delay: 0.8s; }
@keyframes float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-12px) rotate(2deg); }
}
#title-screen h1 {
  font-size: 16px; color: #fbbf24;
  text-shadow: 0 0 10px #f59e0b, 0 0 30px #f59e0b, 2px 2px 0 #92400e;
  text-align: center; line-height: 2; margin-bottom: 8px;
}
#title-screen .subtitle { font-size: 9px; color: #a5b4fc; margin-bottom: 36px; letter-spacing: 1px; }
.start-btn {
  font-family: 'Press Start 2P', monospace; font-size: 13px; color: #fff;
  background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none;
  padding: 16px 44px; cursor: pointer; border-radius: 12px;
  box-shadow: 0 4px 0 #4338ca, 0 6px 20px rgba(99,102,241,0.4);
  animation: pulse-btn 2s ease-in-out infinite;
}
.start-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #4338ca; }
@keyframes pulse-btn {
  0%,100% { box-shadow: 0 4px 0 #4338ca, 0 6px 20px rgba(99,102,241,0.4); }
  50% { box-shadow: 0 4px 0 #4338ca, 0 6px 30px rgba(99,102,241,0.7); }
}

/* ===== Select ===== */
#select-screen {
  position: absolute; inset: 0; display: none; flex-direction: column; align-items: center;
  background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
  z-index: 90; padding: 16px; overflow-y: auto;
}
#select-screen h2 { font-size: 12px; color: #fbbf24; margin: 12px 0 16px; }
.pokemon-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 100%; max-width: 360px; }
.pokemon-card {
  background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 8px 4px; text-align: center; cursor: pointer; transition: all 0.2s;
}
.pokemon-card:hover,.pokemon-card.selected {
  border-color: #fbbf24; background: rgba(251,191,36,0.12); transform: scale(1.05);
}
.pokemon-card img { width: 64px; height: 64px; image-rendering: pixelated; }
.pokemon-card .name { font-size: 7px; color: #e2e8f0; display: block; margin: 2px 0; }
.pokemon-card .type-badge { font-size: 6px; color: #fff; padding: 2px 5px; border-radius: 4px; }
.pokemon-card .stats-preview { font-size: 5px; color: #94a3b8; margin-top: 3px; display: block; line-height: 1.5; }
.confirm-btn {
  font-family: 'Press Start 2P', monospace; font-size: 11px; color: #fff;
  background: linear-gradient(135deg, #22c55e, #16a34a); border: none;
  padding: 14px 32px; cursor: pointer; border-radius: 10px;
  box-shadow: 0 4px 0 #15803d; margin-top: 16px; display: none;
}
.confirm-btn:active { transform: translateY(4px); box-shadow: none; }

/* ===== Battle ===== */
#battle-scene { flex: 1; display: none; flex-direction: column; position: relative; }
.battle-bg {
  flex: 1; position: relative; min-height: 270px; overflow: hidden;
  background: linear-gradient(180deg, #7dd3fc 0%, #bae6fd 35%, #86efac 50%, #4ade80 60%, #22c55e 100%);
}
.ground-enemy {
  position: absolute; top: 43%; right: 8%; width: 150px; height: 20px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.15) 0%, transparent 70%);
}
.ground-player {
  position: absolute; bottom: 6%; left: 4%; width: 170px; height: 24px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.2) 0%, transparent 70%);
}
.info-box {
  position: absolute; background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(245,245,245,0.96));
  border: 3px solid #374151; border-radius: 10px; padding: 8px 12px; min-width: 170px;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.15);
}
.enemy-info { top: 10px; left: 8px; }
.player-info { bottom: 10px; right: 8px; }
.info-box .poke-name { font-size: 9px; color: #1f2937; }
.info-box .poke-level { font-size: 7px; color: #6b7280; float: right; margin-top: 2px; }
.hp-bar-container { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
.hp-label { font-size: 7px; color: #ea580c; font-weight: bold; }
.hp-bar-bg { flex: 1; height: 7px; background: #374151; border-radius: 4px; overflow: hidden; }
.hp-bar-fill { height: 100%; background: var(--hp-green); border-radius: 4px; transition: width 0.5s ease, background-color 0.3s; }
.hp-text { font-size: 6px; color: #6b7280; text-align: right; margin-top: 2px; }
.exp-bar-container { margin-top: 2px; height: 3px; background: #374151; border-radius: 2px; overflow: hidden; }
.exp-bar-fill { height: 100%; background: #60a5fa; border-radius: 2px; transition: width 0.5s; width: 0%; }

.enemy-pokemon {
  position: absolute; top: 14%; right: 12%;
  width: 120px; height: 120px; image-rendering: pixelated;
  filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.25)); transition: all 0.3s; z-index: 5;
}
.player-pokemon {
  position: absolute; bottom: 10%; left: 6%;
  width: 140px; height: 140px; image-rendering: pixelated;
  filter: drop-shadow(2px 6px 8px rgba(0,0,0,0.25)); transition: all 0.3s; z-index: 5;
}

#fx-canvas { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

/* Animations */
@keyframes atk-right { 0%{transform:translateX(0)}25%{transform:translateX(50px) scale(1.08)}50%{transform:translateX(0)} }
@keyframes atk-left { 0%{transform:translateX(0)}25%{transform:translateX(-50px) scale(1.08)}50%{transform:translateX(0)} }
@keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)} }
@keyframes flash-hit {
  0%,100%{opacity:1;filter:drop-shadow(2px 6px 8px rgba(0,0,0,0.25))}
  20%,60%{opacity:0.2;filter:brightness(3) drop-shadow(2px 6px 8px rgba(0,0,0,0.25))}
  40%,80%{opacity:1}
}
@keyframes charge-glow {
  0%{filter:drop-shadow(2px 6px 8px rgba(0,0,0,0.25))}
  50%{filter:drop-shadow(0 0 20px #fbbf24) drop-shadow(0 0 40px #f97316) brightness(1.2)}
  100%{filter:drop-shadow(2px 6px 8px rgba(0,0,0,0.25))}
}
@keyframes faint { 0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(30px) scaleY(0.1)} }
@keyframes enemy-enter { 0%{opacity:0;transform:translateX(60px)}100%{opacity:1;transform:translateX(0)} }

.atk-right { animation: atk-right 0.45s ease-out; }
.atk-left { animation: atk-left 0.45s ease-out; }
.hit-anim { animation: flash-hit 0.45s ease-out, shake 0.45s ease-out; }
.charge-anim { animation: charge-glow 0.6s ease-in-out; }
.faint-anim { animation: faint 0.5s ease-in forwards; }
.enter-anim { animation: enemy-enter 0.4s ease-out; }

.damage-num {
  position: absolute; font-size: 24px; color: #ef4444;
  text-shadow: 2px 2px #000, -1px -1px #000, 1px -1px #000, -1px 1px #000;
  pointer-events: none; animation: dmg-float 1.1s ease-out forwards; z-index: 20;
}
.damage-num.heal { color: #22c55e; }
.damage-num.crit { font-size: 32px; color: #fbbf24; }
.damage-num.miss { font-size: 18px; color: #9ca3af; }
@keyframes dmg-float {
  0%{opacity:1;transform:translateY(0) scale(0.5)}
  15%{transform:translateY(-15px) scale(1.3)}
  40%{opacity:1;transform:translateY(-35px) scale(1)}
  100%{opacity:0;transform:translateY(-65px) scale(0.8)}
}

.level-indicator {
  position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); color: #fbbf24; font-size: 8px;
  padding: 4px 12px; border-radius: 10px; z-index: 11;
}
.streak-indicator {
  position: absolute; top: 6px; right: 6px; font-size: 7px; color: #fff;
  background: linear-gradient(135deg, #ef4444, #f97316);
  padding: 3px 8px; border-radius: 8px; z-index: 11; display: none;
  box-shadow: 0 2px 8px rgba(239,68,68,0.5);
}

.screen-flash {
  position: absolute; inset: 0; z-index: 30; pointer-events: none;
  animation: flash-screen 0.25s ease-out forwards;
}
@keyframes flash-screen { 0%{opacity:0.7}100%{opacity:0} }

/* ===== Battle UI ===== */
.battle-ui {
  background: linear-gradient(180deg, #f1f5f9, #e2e8f0);
  border-top: 3px solid #374151; padding: 10px; display: flex; flex-direction: column; gap: 8px;
}
.message-box {
  background: #fff; border: 2px solid #374151; border-radius: 8px;
  padding: 10px; font-size: 9px; color: #1f2937; line-height: 1.6;
  min-height: 44px; display: flex; align-items: center;
}

.skill-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.skill-btn {
  font-family: 'Press Start 2P', monospace; font-size: 7px; color: #fff;
  border: none; padding: 10px 6px; cursor: pointer; border-radius: 8px;
  transition: all 0.1s; line-height: 1.4; text-align: center;
  background: linear-gradient(135deg, #4b5563, #374151);
  box-shadow: 0 3px 0 #1f2937;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
}
.skill-btn:active { transform: translateY(3px); box-shadow: none !important; }
.skill-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.skill-btn .skill-icon { font-size: 16px; font-family: sans-serif; line-height: 1; }
.skill-btn .skill-name { font-size: 8px; }
.skill-btn .skill-dmg { font-size: 6px; opacity: 0.7; }
.skill-btn .skill-type-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 3px; vertical-align: middle;
}

.question-panel { display: none; flex-direction: column; gap: 8px; }
.question-text {
  font-size: 13px; color: #1f2937; text-align: center; padding: 10px 8px;
  background: #fff; border: 2px solid #374151; border-radius: 8px; line-height: 1.6;
}
.answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.answer-btn {
  font-family: 'Press Start 2P', monospace; font-size: 11px; color: #fff;
  border: none; padding: 13px 6px; cursor: pointer; border-radius: 8px; transition: all 0.1s;
}
.answer-btn:nth-child(1){background:#6366f1;box-shadow:0 3px 0 #4338ca}
.answer-btn:nth-child(2){background:#ef4444;box-shadow:0 3px 0 #b91c1c}
.answer-btn:nth-child(3){background:#22c55e;box-shadow:0 3px 0 #15803d}
.answer-btn:nth-child(4){background:#f97316;box-shadow:0 3px 0 #c2410c}
.answer-btn:active { transform: translateY(3px); box-shadow: none; }
.answer-btn.correct { background: #22c55e !important; animation: btn-ok 0.4s; }
.answer-btn.wrong { background: #6b7280 !important; animation: btn-no 0.3s; }
@keyframes btn-ok { 0%,100%{transform:scale(1)}50%{transform:scale(1.06)} }
@keyframes btn-no { 0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)} }

.timer-bar-container { height: 5px; background: #cbd5e1; border-radius: 3px; overflow: hidden; }
.timer-bar { height: 100%; background: #6366f1; border-radius: 3px; transition: width 0.1s linear; }

/* ===== Result ===== */
#result-screen {
  position: absolute; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; z-index: 80; padding: 24px;
}
#result-screen.victory { background: linear-gradient(180deg, #0f172a 0%, #14532d 100%); }
#result-screen.defeat { background: linear-gradient(180deg, #450a0a 0%, #0f172a 100%); }
#result-screen .result-emoji { font-size: 72px; margin-bottom: 16px; }
#result-screen h2 { font-size: 18px; margin-bottom: 14px; }
#result-screen.victory h2 { color: #fbbf24; }
#result-screen.defeat h2 { color: #ef4444; }
.stats-box {
  background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.15);
  border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; width: 100%; max-width: 280px;
}
.stat-row { display: flex; justify-content: space-between; font-size: 8px; color: #d1d5db; padding: 5px 0; }
.stat-row+.stat-row { border-top: 1px solid rgba(255,255,255,0.08); }
.stat-val { color: #fbbf24; }
.restart-btn {
  font-family: 'Press Start 2P', monospace; font-size: 11px; color: #fff;
  background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none;
  padding: 14px 28px; cursor: pointer; border-radius: 10px;
  box-shadow: 0 4px 0 #4338ca;
}
.restart-btn:active { transform: translateY(4px); box-shadow: none; }

@media(max-height:700px){
  .battle-bg{min-height:220px}
  .enemy-pokemon{width:96px;height:96px;top:12%}
  .player-pokemon{width:112px;height:112px}
  .info-box{padding:6px 8px;min-width:148px}
}
</style>
</head>
<body>

<div id="game">
  <div id="title-screen">
    <div class="title-sprites" id="title-sprites">
      <img src="" alt="" data-id="25">
      <img src="" alt="" data-id="6">
      <img src="" alt="" data-id="150">
    </div>
    <h1>POKEMON<br>MATH BATTLE</h1>
    <p class="subtitle">高中数学对战！</p>
    <button class="start-btn" onclick="showSelectScreen()">START</button>
  </div>

  <div id="select-screen">
    <h2>选择你的宝可梦！</h2>

  <div id="battle-scene">
    <div class="battle-bg" id="battle-bg">

      <div class="ground-enemy"></div>
      <div class="ground-player"></div>
      <div class="info-box enemy-info">
        <span class="poke-name" id="enemy-name">???</span>
        <span class="poke-level" id="enemy-level">Lv.5</span>
        <div class="hp-bar-container">
          <span class="hp-label">HP</span>
          <div class="hp-bar-bg"><div class="hp-bar-fill" id="enemy-hp-bar"></div></div>
        </div>
        <div class="hp-text" id="enemy-hp-text">100/100</div>
      </div>
      <div class="info-box player-info">
        <span class="poke-name" id="player-name">???</span>
        <span class="poke-level" id="player-level">Lv.5</span>
        <div class="hp-bar-container">
          <span class="hp-label">HP</span>

      <img class="player-pokemon" id="player-sprite" src="" alt="">

    </div>
    <div class="battle-ui">
      <div class="message-box" id="message-box">选择技能！</div>
      <div class="timer-bar-container" id="timer-container" style="display:none">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
      <div class="skill-panel" id="skill-panel"></div>
      <div class="question-panel" id="question-panel">
        <div class="question-text" id="question-text"></div>
        <div class="answer-grid" id="answer-grid"></div>
      </div>
    </div>
  </div>

  <div id="result-screen">
    <div class="result-emoji" id="result-emoji"></div>
    <h2 id="result-title"></h2>
    <div class="stats-box">
      <div class="stat-row"><span>回答正确</span><span class="stat-val" id="stat-correct">0</span></div>
      <div class="stat-row"><span>回答错误</span><span class="stat-val" id="stat-wrong">0</span></div>
      <div class="stat-row"><span>正确率</span><span class="stat-val" id="stat-accuracy">0%</span></div>
      <div class="stat-row"><span>最高连击</span><span class="stat-val" id="stat-streak">0</span></div>
      <div class="stat-row"><span>击败对手</span><span class="stat-val" id="stat-defeated">0</span></div>
    </div>
    <button class="restart-btn" onclick="restartGame()">再来一局</button>
  </div>
</div>

<script>
// ===================================================================
// SPRITE CDN
// ===================================================================
const CDN1 = 'https://cdn.jsdelivr.net/gh/PokeAPI/sprites/sprites/pokemon';
const CDN2 = 'https://fastly.jsdelivr.net/gh/PokeAPI/sprites/sprites/pokemon';
const spr = id => `${CDN1}/${id}.png`;
const sprBack = id => `${CDN1}/back/${id}.png`;
const sprFallback = id => `${CDN2}/${id}.png`;
const sprBackFallback = id => `${CDN2}/back/${id}.png`;

// Preload images with fallback
function loadImg(src, fallback) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => res(src);
    img.onerror = () => {
      if (fallback) {
        const img2 = new Image();
        img2.onload = () => res(fallback);
        img2.onerror = () => res(src); // still use original
        img2.src = fallback;
      } else res(src);
    };
    img.src = src;
  });
}

// Apply fallback to all <img> tags
function imgFallback(el, fallbackSrc) {
  el.onerror = function() {
    if (this.dataset.tried) return;
    this.dataset.tried = '1';
    this.src = fallbackSrc;
  };
}

// ===================================================================
// TYPE SYSTEM
// ===================================================================
const TC = {
  electric:'#eab308', fire:'#ef4444', water:'#3b82f6', grass:'#22c55e',
  normal:'#9ca3af', ghost:'#8b5cf6', flying:'#93c5fd', bug:'#84cc16',
  psychic:'#ec4899', poison:'#a855f7', rock:'#78716c', fighting:'#b45309',
  ice:'#67e8f9', dragon:'#7c3aed', dark:'#44403c', fairy:'#f9a8d4',
};
const TI = {
  electric:'⚡', fire:'🔥', water:'💧', grass:'🍃',
  normal:'💥', ghost:'👻', flying:'🌪️', bug:'🐛',
  psychic:'🔮', poison:'☠️', rock:'🪨', fighting:'👊',
  ice:'❄️', dragon:'🐲', dark:'🌑', fairy:'✨',
};

// ===================================================================
// POKEMON DATA — each has 4 skills
// ===================================================================
const POKEMON = [
  { name:'皮卡丘', id:25, type:'electric', hp:110, skills:[
    { name:'电击', type:'electric', power:25, acc:100, desc:'基础电系攻击' },
    { name:'十万伏特', type:'electric', power:50, acc:90, desc:'强力电击' },
    { name:'电光一闪', type:'normal', power:30, acc:100, desc:'先制攻击' },
    { name:'打雷', type:'electric', power:70, acc:70, desc:'最强电击！' },
  ]},
  { name:'喷火龙', id:6, type:'fire', hp:120, skills:[
    { name:'火花', type:'fire', power:25, acc:100, desc:'基础火系攻击' },
    { name:'火焰喷射', type:'fire', power:50, acc:90, desc:'强力喷射' },
    { name:'龙之怒', type:'dragon', power:40, acc:100, desc:'龙系攻击' },
    { name:'大字爆炎', type:'fire', power:75, acc:70, desc:'最强火焰！' },
  ]},
  { name:'水箭龟', id:9, type:'water', hp:140, skills:[
    { name:'水枪', type:'water', power:25, acc:100, desc:'基础水系攻击' },
    { name:'水炮', type:'water', power:55, acc:85, desc:'强力水炮' },
    { name:'冰冻光线', type:'ice', power:45, acc:90, desc:'冰系攻击' },
    { name:'破坏光线', type:'normal', power:80, acc:65, desc:'毁灭光线！' },
  ]},
  { name:'妙蛙花', id:3, type:'grass', hp:130, skills:[
    { name:'藤鞭', type:'grass', power:25, acc:100, desc:'基础草系攻击' },
    { name:'飞叶快刀', type:'grass', power:45, acc:95, desc:'锋利叶片' },
    { name:'寄生种子', type:'grass', power:35, acc:90, desc:'吸血回复', heal:true },
    { name:'日光束', type:'grass', power:70, acc:75, desc:'最强草系！' },

// Shuffle helper
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function randInt(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

class FX {

    for(let i=0;i<n;i++){
      const a=Math.PI*2/n*i+Math.random()*0.5;
      const sp=(opts.sp||3)+Math.random()*(opts.sv||2);
      const sz=(opts.sz||3)+Math.random()*(opts.szv||3);
      this.add({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,sz,
        c:colors[Math.floor(Math.random()*colors.length)],
        dk:opts.dk||0.02,g:opts.g||0.05,sh:opts.sh||'c'});
    }
  }

    const m={fire:'fire',water:'water',electric:'electric',grass:'grass',bug:'grass',
      ghost:'ghost',psychic:'psychic',ice:'ice',dragon:'dragon',normal:'normal',
      flying:'normal',rock:'normal',fighting:'fire',poison:'ghost',dark:'dark',fairy:'psychic'};
    (this[m[type]||'normal'])(x,y);
  }

  loop(){
    this.on=true;
    const go=()=>{
      if(!this.p.length){this.on=false;return;}
      this.x.clearRect(0,0,this.c.width,this.c.height);
      this.p=this.p.filter(p=>{
        p.life-=p.dk; p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=0.98;
        if(p.life<=0)return false;
        const ctx=this.x; ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
        if(p.glow){ctx.shadowColor=p.c;ctx.shadowBlur=12;}
        ctx.fillStyle=p.c; ctx.translate(p.x,p.y);
        const s=p.sz*p.life;
        if(p.sh==='s'){this._star(ctx,s);}
        else if(p.sh==='b'){this._bolt(ctx,s);}
        else if(p.sh==='l'){ctx.rotate(Math.atan2(p.vy,p.vx));ctx.beginPath();ctx.ellipse(0,0,s,s*0.35,0,0,Math.PI*2);ctx.fill();}
        else if(p.sh==='+'){ctx.fillRect(-s/6,-s/2,s/3,s);ctx.fillRect(-s/2,-s/6,s,s/3);}
        else{ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();}
        ctx.restore(); return true;
      });
      requestAnimationFrame(go);
    };
    go();
  }
  _star(ctx,r){ctx.beginPath();for(let i=0;i<5;i++){const a=Math.PI*2/5*i-Math.PI/2;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);const ia=a+Math.PI/5;ctx.lineTo(Math.cos(ia)*r*0.4,Math.sin(ia)*r*0.4);}ctx.closePath();ctx.fill();}
  _bolt(ctx,s){ctx.beginPath();ctx.moveTo(-s,-s);ctx.lineTo(s*0.3,-s*0.3);ctx.lineTo(0,0);ctx.lineTo(s,s);ctx.lineTo(-s*0.3,s*0.3);ctx.lineTo(0,0);ctx.closePath();ctx.fill();}
  clear(){this.p=[];this.x.clearRect(0,0,this.c.width,this.c.height);}
}

// ===================================================================
// GAME STATE
// ===================================================================
let fx;
let usedQuestions = new Set();
let st = {
  player:null, enemy:null,
  pHP:0, pMaxHP:0, eHP:0, eMaxHP:0,
  round:1, streak:0, maxStreak:0,
  correct:0, wrong:0, defeated:0,
  curSkill:null, busy:false, selectedIdx:-1,
  timerIv:null, qBank:[],
};

// ===================================================================
// SCREENS
// ===================================================================
function showSelectScreen(){
  document.getElementById('title-screen').style.display='none';
  document.getElementById('select-screen').style.display='flex';
  const g=document.getElementById('pokemon-grid'); g.innerHTML='';
  POKEMON.forEach((p,i)=>{
    const d=document.createElement('div'); d.className='pokemon-card';
    const cardImg = document.createElement('img');
    cardImg.src = spr(p.id);
    imgFallback(cardImg, sprFallback(p.id));
    d.appendChild(cardImg);
    d.insertAdjacentHTML('beforeend', `<span class="name">${p.name}</span>
      <span class="type-badge" style="background:${TC[p.type]}">${p.type}</span>
      <span class="stats-preview">HP:${p.hp}</span>`);
    d.onclick=()=>selPoke(i); g.appendChild(d);
  });
}
function selPoke(i){
  st.selectedIdx=i;
  document.querySelectorAll('.pokemon-card').forEach((c,j)=>c.classList.toggle('selected',j===i));
  document.getElementById('confirm-btn').style.display='block';
}

function startBattle(){
  if(st.selectedIdx<0)return;
  st.player={...POKEMON[st.selectedIdx]};
  st.pHP=st.player.hp; st.pMaxHP=st.player.hp;
  st.round=1; st.streak=0; st.maxStreak=0;
  st.correct=0; st.wrong=0; st.defeated=0; st.busy=false;
  usedQuestions=new Set();
  // Shuffle question bank
  st.qBank=shuffle([...Q_BANK]);

  document.getElementById('select-screen').style.display='none';
  document.getElementById('battle-scene').style.display='flex';

  const canvas=document.getElementById('fx-canvas');
  fx=new FX(canvas); fx.resize();
  window.onresize=()=>fx&&fx.resize();

  document.getElementById('player-name').textContent=st.player.name;
  const playerSpr = document.getElementById('player-sprite');
  playerSpr.src=sprBack(st.player.id);
  imgFallback(playerSpr, sprBackFallback(st.player.id));

  spawnEnemy();
  renderSkills();
  updateUI();
  msg(`${st.player.name}，就决定是你了！`);
}

function spawnEnemy(){
  const base=ENEMIES[randInt(0,ENEMIES.length-1)];
  const lv=Math.min(5+st.round*3,50);
  const scale=0.8+st.round*0.3;
  const maxHP=Math.floor(80*scale);
  st.enemy={...base, lv, atkPow:base.atk+st.round*2};
  st.eHP=maxHP; st.eMaxHP=maxHP;

  document.getElementById('enemy-name').textContent=st.enemy.name;
  document.getElementById('enemy-level').textContent=`Lv.${lv}`;
  const eSprite=document.getElementById('enemy-sprite');
  eSprite.src=spr(st.enemy.id);
  imgFallback(eSprite, sprFallback(st.enemy.id));
  eSprite.className='enemy-pokemon enter-anim';
  setTimeout(()=>eSprite.classList.remove('enter-anim'),400);
  document.getElementById('level-indicator').textContent=`ROUND ${st.round}`;
  document.getElementById('player-level').textContent=`Lv.${5+st.defeated*3}`;
}

// ===================================================================
// UI
// ===================================================================
function updateUI(){
  const pp=Math.max(0,st.pHP/st.pMaxHP*100);
  const pb=document.getElementById('player-hp-bar');
  pb.style.width=pp+'%';
  pb.style.backgroundColor=pp>50?'var(--hp-green)':pp>20?'var(--hp-yellow)':'var(--hp-red)';
  document.getElementById('player-hp-text').textContent=`${Math.max(0,st.pHP)}/${st.pMaxHP}`;

  const ep=Math.max(0,st.eHP/st.eMaxHP*100);
  const eb=document.getElementById('enemy-hp-bar');
  eb.style.width=ep+'%';
  eb.style.backgroundColor=ep>50?'var(--hp-green)':ep>20?'var(--hp-yellow)':'var(--hp-red)';
  document.getElementById('enemy-hp-text').textContent=`${Math.max(0,st.eHP)}/${st.eMaxHP}`;

  const si=document.getElementById('streak-indicator');
  if(st.streak>=2){si.style.display='block';si.textContent=`🔥 x${st.streak}`;}
  else si.style.display='none';

  document.getElementById('exp-bar').style.width=(st.defeated/5*100)+'%';
}

function msg(t){ document.getElementById('message-box').textContent=t; }

function renderSkills(){
  const panel=document.getElementById('skill-panel');
  panel.innerHTML='';
  st.player.skills.forEach((sk,i)=>{
    const btn=document.createElement('button');
    btn.className='skill-btn';
    const icon = TI[sk.type] || '💥';
    btn.innerHTML=`<span class="skill-icon">${icon}</span><span class="skill-name"><span class="skill-type-dot" style="background:${TC[sk.type]}"></span>${sk.name}</span><span class="skill-dmg">威力${sk.power} 命中${sk.acc}</span>`;
    btn.onclick=()=>useSkill(i);
    panel.appendChild(btn);
  });
}

// ===================================================================
// BATTLE FLOW
// ===================================================================
function useSkill(idx){
  if(st.busy)return;
  st.curSkill=st.player.skills[idx];
  msg(`${st.player.name}使用${st.curSkill.name}！答对才能命中！`);
  showQuestion();
}

function getQuestion(){
  // Get next unused question from shuffled bank
  for(let i=0;i<st.qBank.length;i++){
    if(!usedQuestions.has(i)){
      usedQuestions.add(i);
      return st.qBank[i];
    }
  }
  // All used, reshuffle
  usedQuestions.clear();
  st.qBank=shuffle([...Q_BANK]);
  usedQuestions.add(0);
  return st.qBank[0];
}

function showQuestion(){
  st.busy=true;
  const q=getQuestion();
  const opts=shuffle([q.a,...q.w]);
  st.curQ={text:q.q, answer:q.a, options:opts};

  document.getElementById('skill-panel').style.display='none';
  const panel=document.getElementById('question-panel');
  panel.style.display='flex';
  document.getElementById('question-text').textContent=q.q;

  const grid=document.getElementById('answer-grid'); grid.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='answer-btn'; btn.textContent=opt;
    btn.onclick=()=>submitAnswer(opt,btn);
    grid.appendChild(btn);
  });
  startTimer();
}

function startTimer(){
  const dur=20;
  const bar=document.getElementById('timer-bar');
  const con=document.getElementById('timer-container');
  con.style.display='block'; bar.style.width='100%';
  clearInterval(st.timerIv);
  const t0=Date.now();
  st.timerIv=setInterval(()=>{
    const rem=Math.max(0,dur-(Date.now()-t0)/1000);
    bar.style.width=(rem/dur*100)+'%';
    bar.style.backgroundColor=rem>dur*0.3?'#6366f1':'#ef4444';
    if(rem<=0){clearInterval(st.timerIv);onWrong();}
  },50);
}

function submitAnswer(chosen,btn){
  if(!st.busy)return;
  clearInterval(st.timerIv);
  document.getElementById('timer-container').style.display='none';
  document.querySelectorAll('.answer-btn').forEach(b=>{b.onclick=null;});
  document.querySelectorAll('.answer-btn').forEach(b=>{
    if(b.textContent===st.curQ.answer)b.classList.add('correct');
    else if(b===btn&&chosen!==st.curQ.answer)b.classList.add('wrong');
  });
  chosen===st.curQ.answer ? onCorrect() : onWrong();
}

async function onCorrect(){
  st.correct++; st.streak++;
  if(st.streak>st.maxStreak)st.maxStreak=st.streak;

  const sk=st.curSkill;
  // Check accuracy
  const hit=Math.random()*100<sk.acc;
  if(!hit){
    msg(`${st.player.name}的${sk.name}没有命中！`);
    await sleep(400);
    fx.resize();
    showMiss('enemy');
    await sleep(700);
    endTurn(); return;
  }

  // Streak bonus
  const streakBonus=st.streak>=3?1.3:st.streak>=5?1.5:1;
  let dmg=Math.floor(sk.power*streakBonus);
  const isCrit=Math.random()<0.15;
  if(isCrit)dmg=Math.floor(dmg*1.5);

  const bonusText=st.streak>=3?` 连击x${st.streak}！`:'';
  const critText=isCrit?' 暴击！':'';
  msg(`答对了！${sk.name}命中！${critText}${bonusText}`);

  await sleep(350);
  fx.resize();

  // Power >= 60: charge animation
  if(sk.power>=60){
    const pe=document.getElementById('player-sprite');
    const pr=pe.getBoundingClientRect();
    const br=document.getElementById('battle-bg').getBoundingClientRect();
    pe.classList.add('charge-anim');
    fx.charge(pr.left-br.left+pr.width/2, pr.top-br.top+pr.height/2);
    await sleep(550);
    pe.classList.remove('charge-anim');
  }

  await playAtk(true);

  // FX at enemy
  const ee=document.getElementById('enemy-sprite');
  const er=ee.getBoundingClientRect();
  const br2=document.getElementById('battle-bg').getBoundingClientRect();
  const ex=er.left-br2.left+er.width/2, ey=er.top-br2.top+er.height/2;

  fx.typeFX(sk.type,ex,ey);
  if(sk.power>=50) screenFlash(TC[sk.type]||'#fff');
  if(sk.power>=60){ fx.beam(br2.width*0.25,br2.height*0.7,ex,ey,
    [TC[sk.type]||'#fff','#fff'],20); }

  st.eHP=Math.max(0,st.eHP-dmg);
  showDmg('enemy',dmg,false,isCrit);
  updateUI();

  // Heal skill
  if(sk.heal){
    const h=Math.floor(dmg*0.5);
    st.pHP=Math.min(st.pMaxHP,st.pHP+h);
    const pe2=document.getElementById('player-sprite');
    const pr2=pe2.getBoundingClientRect();
    fx.heal(pr2.left-br2.left+pr2.width/2,pr2.top-br2.top+pr2.height/2);
    showDmg('player',h,true);
    updateUI();
  }

  if(st.eHP<=0){ await sleep(400); await enemyDefeated(); return; }
  await sleep(500);
  endTurn();
}

async function onWrong(){
  st.wrong++; st.streak=0;
  msg(`答错了！${st.enemy.name}发动攻击！`);
  updateUI();

  await sleep(400);
  await playAtk(false);

  fx.resize();
  const pe=document.getElementById('player-sprite');
  const pr=pe.getBoundingClientRect();
  const br=document.getElementById('battle-bg').getBoundingClientRect();
  const px=pr.left-br.left+pr.width/2, py=pr.top-br.top+pr.height/2;
  fx.typeFX(st.enemy.type,px,py);

  const dmg=st.enemy.atkPow+randInt(0,5);
  st.pHP=Math.max(0,st.pHP-dmg);
  showDmg('player',dmg);
  updateUI();

  if(st.pHP<=0){ await sleep(400); showResult(false); return; }
  await sleep(500);
  endTurn();
}

async function enemyDefeated(){
  st.defeated++; st.round++;
  const el=document.getElementById('enemy-sprite');
  el.classList.add('faint-anim');

  // Burst FX at enemy position
  fx.resize();
  const er=el.getBoundingClientRect();
  const br=document.getElementById('battle-bg').getBoundingClientRect();
  fx.burst(er.left-br.left+er.width/2, er.top-br.top+er.height/2,
    30,['#fbbf24','#fff','#f97316'],{sp:4,sz:4,dk:0.015});

  msg(`${st.enemy.name}被击败了！`);
  await sleep(900);

  if(st.defeated>=5){ showResult(true); return; }

  const heal=Math.floor(st.pMaxHP*0.2);
  st.pHP=Math.min(st.pMaxHP,st.pHP+heal);

  el.classList.remove('faint-anim');
  el.style.opacity='1'; el.style.transform='';
  spawnEnemy();
  updateUI();
  msg(`野生的${st.enemy.name}出现了！(+${heal}HP)`);
  await sleep(700);
  endTurn();
}

function endTurn(){
  st.busy=false;
  document.getElementById('question-panel').style.display='none';
  document.getElementById('skill-panel').style.display='grid';
  msg('选择技能！');
  updateUI();
}

// ===================================================================
// ANIMATIONS
// ===================================================================
async function playAtk(isPlayer){
  return new Promise(res=>{
    if(isPlayer){
      const e=document.getElementById('player-sprite');
      e.classList.add('atk-right');
      setTimeout(()=>{e.classList.remove('atk-right');
        const t=document.getElementById('enemy-sprite');
        t.classList.add('hit-anim');
        setTimeout(()=>t.classList.remove('hit-anim'),450);
        res();
      },220);
    } else {
      const e=document.getElementById('enemy-sprite');
      e.classList.add('atk-left');
      setTimeout(()=>{e.classList.remove('atk-left');
        const t=document.getElementById('player-sprite');
        t.classList.add('hit-anim');
        setTimeout(()=>t.classList.remove('hit-anim'),450);
        res();
      },220);
    }
  });
}

function showDmg(target,amount,isHeal=false,isCrit=false){
  const c=document.getElementById('battle-bg');
  const el=document.createElement('div');
  el.className='damage-num'+(isHeal?' heal':'')+(isCrit?' crit':'');
  el.textContent=(isHeal?'+':'-')+amount;
  if(target==='enemy'){el.style.right='45px';el.style.top='25px';}
  else{el.style.left='45px';el.style.bottom='75px';}
  c.appendChild(el);
  setTimeout(()=>el.remove(),1100);
}

function showMiss(target){
  const c=document.getElementById('battle-bg');
  const el=document.createElement('div');
  el.className='damage-num miss';
  el.textContent='MISS';
  if(target==='enemy'){el.style.right='55px';el.style.top='35px';}
  else{el.style.left='55px';el.style.bottom='85px';}
  c.appendChild(el);
  setTimeout(()=>el.remove(),1100);
}

function screenFlash(color){
  const el=document.createElement('div');
  el.className='screen-flash'; el.style.background=color;
  document.getElementById('battle-bg').appendChild(el);
  setTimeout(()=>el.remove(),250);
}

// ===================================================================
// RESULT
// ===================================================================
function showResult(win){
  clearInterval(st.timerIv); st.busy=true;
  const s=document.getElementById('result-screen');
  s.style.display='flex'; s.className=win?'victory':'defeat';
  document.getElementById('result-emoji').textContent=win?'🏆':'💀';
  document.getElementById('result-title').textContent=win?'胜利！':'战斗结束...';
  const tot=st.correct+st.wrong;
  document.getElementById('stat-correct').textContent=st.correct;
  document.getElementById('stat-wrong').textContent=st.wrong;
  document.getElementById('stat-accuracy').textContent=tot>0?Math.round(st.correct/tot*100)+'%':'0%';
  document.getElementById('stat-streak').textContent=st.maxStreak;
  document.getElementById('stat-defeated').textContent=st.defeated;
}

function restartGame(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('battle-scene').style.display='none';
  document.getElementById('select-screen').style.display='none';
  document.getElementById('title-screen').style.display='flex';
  st.selectedIdx=-1;
  if(fx)fx.clear();
}

// ===================================================================
// PRELOAD TITLE SPRITES WITH FALLBACK
// ===================================================================
(function initSprites(){
  document.querySelectorAll('#title-sprites img').forEach(img => {
    const id = img.dataset.id;
    img.src = spr(id);
    imgFallback(img, sprFallback(id));
  });
})();
</script>
